version: "3.9"

networks:
  banking-net:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_bank_data:
  mongodb_data:
  neo4j_data:
  neo4j_logs:
  kafka_data:
  redis_data:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./auth-service/migrations:/docker-entrypoint-initdb.d
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-bank:
    image: postgres:16-alpine
    container_name: postgres-bank
    environment:
      POSTGRES_DB: bank_db
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_bank_data:/var/lib/postgresql/data
      - ./k8s-infrastructure/db-init/bank:/docker-entrypoint-initdb.d
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user -d bank_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: customers_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./customer-service/seeds/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 15

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - banking-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application Services ────────────────────────────────────────────────────

  mock-swift-rail:
    build: ./mock-swift-rail
    container_name: mock-swift-rail
    ports:
      - "9999:9999"
    networks:
      - banking-net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    env_file: .env.example
    environment:
      POSTGRES_AUTH_HOST: postgres-auth
      POSTGRES_AUTH_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - banking-net

  accounts-service:
    build: ./accounts-service
    container_name: accounts-service
    ports:
      - "8002:8002"
    env_file: .env.example
    environment:
      POSTGRES_BANK_HOST: postgres-bank
      POSTGRES_BANK_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-bank:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - banking-net

  payments-service:
    build: ./payments-service
    container_name: payments-service
    ports:
      - "8003:8003"
    env_file: .env.example
    environment:
      POSTGRES_BANK_HOST: postgres-bank
      POSTGRES_BANK_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SWIFT_RAIL_URL: http://mock-swift-rail:9999
    depends_on:
      postgres-bank:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-swift-rail:
        condition: service_started
    networks:
      - banking-net

  fraud-detection-service:
    build: ./fraud-detection-service
    container_name: fraud-detection-service
    ports:
      - "8004:8004"
    env_file: .env.example
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - banking-net

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8005:8005"
    env_file: .env.example
    environment:
      MONGODB_URI: mongodb://mongo_user:mongo_password@mongodb:27017/customers_db?authSource=admin
      ACCOUNTS_SERVICE_URL: http://accounts-service:8002
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - banking-net

  notification-service:
    build: ./notification-service
    container_name: notification-service
    env_file: .env.example
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MOCK_EXTERNAL: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - banking-net

  reporting-service:
    build: ./reporting-service
    container_name: reporting-service
    ports:
      - "8007:8007"
    env_file: .env.example
    environment:
      POSTGRES_BANK_HOST: postgres-bank
      POSTGRES_BANK_PORT: 5432
      MONGODB_URI: mongodb://mongo_user:mongo_password@mongodb:27017/customers_db?authSource=admin
    depends_on:
      postgres-bank:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - banking-net

  bank-api-gateway:
    build: ./bank-api-gateway
    container_name: bank-api-gateway
    ports:
      - "3000:3000"
    env_file: .env.example
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      ACCOUNTS_SERVICE_URL: http://accounts-service:8002
      PAYMENTS_SERVICE_URL: http://payments-service:8003
      FRAUD_SERVICE_URL: http://fraud-detection-service:8004
      CUSTOMER_SERVICE_URL: http://customer-service:8005
      REPORTING_SERVICE_URL: http://reporting-service:8007
    depends_on:
      - auth-service
      - accounts-service
      - payments-service
      - customer-service
      - reporting-service
    networks:
      - banking-net

  # ── Global Bank Profile Services ───────────────────────────────────────────

  mobile-banking-service:
    profiles: ["global"]
