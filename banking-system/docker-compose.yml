    environment:
      PORT: "8101"
      SERVICE_NAME: "mobile-banking-service"
      SERVICE_DOMAIN: "Channels"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      REDIS_URL: "redis://redis:6379"
      POSTGRES_BANK_HOST: "postgres-bank"
      MONGODB_URI: "mongodb://mongo_user:mongo_password@mongodb:27017/customers_db?authSource=admin"
      NEO4J_URI: "bolt://neo4j:7687"
      API_MANAGEMENT_SERVICE_URL: "http://api-management-service:8170"
      IAM_SERVICE_URL: "http://iam-service:8110"
      CUSTOMER_PROFILE_SERVICE_URL: "http://customer-profile-service:8120"
      ACCOUNTS_SERVICE_URL: "http://accounts-service:8002"
      KAFKA_TOPIC_CHANNEL_MOBILE_LOGIN: "channel.mobile.login"
      KAFKA_TOPIC_FRAUD_ALERT: "fraud.alert"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
