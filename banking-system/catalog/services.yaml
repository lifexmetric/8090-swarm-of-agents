# Global Bank service catalog. Dummy services are runnable and return synthetic data.
services:
  - name: mobile-banking-service
    domain: "Channels"
    owner: "Channels Platform Team"
    path: "channels/mobile-banking-service"
    port: 8101
    runtime: node-lightweight-fake-service
    health: "http://localhost:8101/health"
    api:
      basePath: "/v1/mobile/sessions"
      style: REST
    dependencies:
      - service: api-management-service
        env: API_MANAGEMENT_SERVICE_URL
        url: "http://api-management-service:8170"
      - service: iam-service
        env: IAM_SERVICE_URL
        url: "http://iam-service:8110"
      - service: customer-profile-service
        env: CUSTOMER_PROFILE_SERVICE_URL
        url: "http://customer-profile-service:8120"
      - service: accounts-service
        env: ACCOUNTS_SERVICE_URL
        url: "http://accounts-service:8002"
    topicsProduced:
      - channel.mobile.login
    topicsConsumed:
      - fraud.alert
  - name: web-banking-service
